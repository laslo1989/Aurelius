<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURELIUS | Protocol</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #fcc200; --bg: #0099cc; --card: #1a2a33; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        #main-site { display: block; padding-top: 20px; }
        #dashboard { display: none; padding: 40px; text-align: center; background: #080808; min-height: 100vh; }

        header { padding: 10px 50px; display: flex; justify-content: flex-end; }
        .status-top { font-family: 'Orbitron'; color: #00ffff; font-size: 11px; letter-spacing: 1px; }

        .auth-container { max-width: 850px; margin: 20px auto; text-align: center; padding: 0 20px; }
        .tabs { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; }
        .tab-btn { 
            padding: 15px 45px; font-family: 'Orbitron'; cursor: pointer; 
            border: 2px solid var(--gold); background: transparent; color: var(--gold); 
            border-radius: 8px; font-size: 14px; transition: 0.3s; font-weight: bold;
        }
        .tab-btn.active { background: var(--gold); color: #1a2a33; box-shadow: 0 0 20px rgba(252, 194, 0, 0.6); }

        .form-card { background: var(--card); border-radius: 20px; padding: 45px; box-shadow: 0 15px 40px rgba(0,0,0,0.4); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .field { text-align: left; }
        .field label { display: block; font-size: 11px; color: var(--gold); margin-bottom: 10px; font-family: 'Orbitron'; text-transform: uppercase; }
        .field input { 
            width: 100%; padding: 14px; background: rgba(0,0,0,0.3); border: 1px solid #33444d; 
            color: white; border-radius: 4px; border-left: 4px solid var(--gold); box-sizing: border-box; outline: none;
        }

        .btn-confirm { 
            width: 100%; grid-column: span 2; padding: 20px; background: var(--gold); 
            border: none; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; 
            margin-top: 25px; border-radius: 8px; font-size: 16px; text-transform: uppercase;
        }

        #status-msg { grid-column: span 2; font-size: 13px; margin-top: 10px; font-weight: bold; min-height: 20px; text-align: center; }
        
        /* Dashboard */
        .balance-box { background: #111; border: 1px solid var(--gold); padding: 60px; border-radius: 25px; display: inline-block; margin-top: 50px; }
        
        .support-fixed { 
            position: fixed; bottom: 25px; left: 25px; background: #00ffff; color: black; 
            padding: 15px 30px; border-radius: 8px; font-family: 'Orbitron'; font-weight: bold; text-decoration: none; font-size: 12px;
        }

        @media (max-width: 700px) { .form-grid { grid-template-columns: 1fr; } .btn-confirm { grid-column: span 1; } }
    </style>
</head>
<body>

<div id="main-site">
    <header><div class="status-top">SYSTEM STATUS: READY</div></header>

    <div class="auth-container">
        <div class="tabs">
            <button class="tab-btn active" id="btn-reg" onclick="setMode('reg')">REGISTRATION</button>
            <button class="tab-btn" id="btn-login" onclick="setMode('login')">LOGIN</button>
        </div>

        <div class="form-card">
            <div class="form-grid">
                <div class="field reg-only"><label>Full Name</label><input type="text" id="f_name"></div>
                <div class="field reg-only"><label>User Name</label><input type="text" id="u_name"></div>
                <div class="field"><label>Email Address</label><input type="email" id="u_email"></div>
                <div class="field reg-only"><label>Confirm Email</label><input type="email"></div>
                <div class="field"><label>Password</label><input type="password" id="u_pass"></div>
                <div class="field reg-only"><label>Confirm Password</label><input type="password"></div>
                <div class="field reg-only"><label>Secret Question</label><input type="text" id="s_quest"></div>
                <div class="field reg-only"><label>Secret Answer</label><input type="text" id="s_ans"></div>
                
                <div id="status-msg"></div>
                <button class="btn-confirm" id="action-btn" onclick="runAuth()">CONFIRM ACTION</button>
            </div>
        </div>
    </div>
    
    <a href="https://t.me/Laslo19898989" class="support-fixed" target="_blank">SUPPORT ONLINE</a>
</div>

<div id="dashboard">
    <div style="display:flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 20px;">
        <div style="font-family: 'Orbitron'; color: var(--gold); font-size: 20px;">AURELIUS / DASHBOARD</div>
        <button onclick="location.reload()" style="background: var(--gold); border:none; padding: 10px 20px; border-radius: 5px; cursor:pointer; font-weight:bold;">LOGOUT</button>
    </div>
    <div class="balance-box">
        <p style="color: #888; text-transform: uppercase;">Account Balance</p>
        <h2 style="font-size: 64px; margin: 15px 0; color: #00ff88; font-family: 'Orbitron';">$ 0.00</h2>
    </div>
</div>

<script>
    // ТВОИ РАБОЧИЕ КЛЮЧИ
    const URL = 'https://kxpsdcepytmnbtzexlup.supabase.co'; 
    const KEY = 'sb_publishable_VtS1oNI1B5mbrEnMn8YtsQ_-Ok6y6k7'; 
    const _supa = supabase.createClient(URL, KEY);

    const msg = document.getElementById('status-msg');

    function setMode(m) {
        const regF = document.querySelectorAll('.reg-only');
        const btn = document.getElementById('action-btn');
        msg.innerText = "";
        if(m === 'login') {
            regF.forEach(f => f.style.display = 'none');
            btn.innerText = "LOGIN";
            document.getElementById('btn-login').classList.add('active');
            document.getElementById('btn-reg').classList.remove('active');
        } else {
            regF.forEach(f => f.style.display = 'block');
            btn.innerText = "CONFIRM ACTION";
            document.getElementById('btn-reg').classList.add('active');
            document.getElementById('btn-login').classList.remove('active');
        }
    }

    async function runAuth() {
        const email = document.getElementById('u_email').value;
        const pass = document.getElementById('u_pass').value;
        const btn = document.getElementById('action-btn');
        
        msg.style.color = 'white';
        msg.innerText = "Connecting...";

        if(!email || !pass) {
            msg.innerText = "Error: Email/Password required";
            msg.style.color = "#ff4444";
            return;
        }

        if(btn.innerText === "LOGIN") {
            const { data, error } = await _supa.auth.signInWithPassword({ email, password: pass });
            if(error) {
                msg.innerText = "Error: Invalid details";
                msg.style.color = "#ff4444";
            } else {
                showDashboard();
            }
        } else {
            const { data, error } = await _supa.auth.signUp({ email, password: pass });
            if(error) {
                msg.innerText = "Error: " + error.message;
                msg.style.color = "#ff4444";
            } else {
                setMode('login');
                msg.innerText = "Success! Please Login.";
                msg.style.color = "#00ff88";
            }
        }
    }

    function showDashboard() {
        document.getElementById('main-site').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
    }
</script>
</body>
                    </html>
