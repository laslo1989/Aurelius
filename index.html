<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURELIUS | AI PROTOCOL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd700; --accent: #00f2ff; --dark: #0a0a0a; }
        
        body {
            margin: 0; padding: 0; background: #000;
            color: white; font-family: 'Inter', sans-serif; min-height: 100vh;
            overflow-x: hidden;
        }

        /* Анимация падающих монет */
        #coin-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        /* Бегущая строка */
        .top-bar {
            position: fixed; top: 0; width: 100%; height: 40px;
            background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--accent);
            display: flex; align-items: center; z-index: 1000; overflow: hidden;
        }
        .ticker {
            white-space: nowrap; animation: move 25s linear infinite;
            color: var(--accent); font-family: 'Orbitron'; font-size: 0.8em; text-transform: uppercase;
        }
        @keyframes move { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .wrapper { max-width: 850px; margin: 100px auto; padding: 20px; text-align: center; position: relative; z-index: 1; }

        /* Кнопки переключения */
        .tab-box { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .btn-tab {
            padding: 12px 35px; border: 2px solid var(--gold); background: transparent;
            color: var(--gold); font-family: 'Orbitron'; cursor: pointer; transition: 0.3s;
            border-radius: 5px; font-weight: bold; text-transform: uppercase;
        }
        .btn-tab.active { background: var(--gold); color: black; box-shadow: 0 0 20px var(--gold); }

        /* Карточка формы */
        .main-card {
            background: rgba(10, 10, 10, 0.9); border: 1px solid rgba(255, 215, 0, 0.3);
            padding: 40px; border-radius: 15px; display: grid;
            grid-template-columns: 1fr 1fr; gap: 20px; backdrop-filter: blur(10px);
        }
        @media (max-width: 600px) { .main-card { grid-template-columns: 1fr; } }

        .field { text-align: left; transition: 0.3s; }
        .field label { display: block; font-size: 0.7em; color: var(--gold); margin-bottom: 5px; font-family: 'Orbitron'; }
        .field input {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #333;
            color: white; border-left: 3px solid var(--gold); box-sizing: border-box;
        }

        .btn-action {
            grid-column: 1 / -1; padding: 18px; background: var(--gold); border: none;
            font-family: 'Orbitron'; font-weight: bold; cursor: pointer; margin-top: 15px;
            transition: 0.3s; text-transform: uppercase; letter-spacing: 2px;
        }
        .btn-action:hover { background: white; box-shadow: 0 0 30px white; }

        /* Блок сертификата */
        .cert-section {
            margin-top: 50px; background: rgba(255, 215, 0, 0.05);
            padding: 30px; border-radius: 10px; border: 1px solid rgba(255,215,0,0.1);
            display: flex; align-items: center; gap: 30px; text-align: left;
        }
        .cert-img { width: 100px; height: 130px; border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; font-size: 3em; background: rgba(0,0,0,0.5); }

        .support-btn {
            position: fixed; bottom: 20px; left: 20px;
            background: var(--accent); color: black; padding: 12px 25px;
            border-radius: 5px; font-family: 'Orbitron'; font-weight: bold;
            text-decoration: none; box-shadow: 0 0 15px var(--accent); z-index: 1000;
        }
    </style>
</head>
<body>

<canvas id="coin-canvas"></canvas>

<div class="top-bar">
    <div class="ticker">SYSTEM STATUS: OPTIMAL • BTC: $64,859 • AURELIUS PROTOCOL ACTIVE • UK REGULATED: 13693096 • SUPPORT ONLINE</div>
</div>

<div class="wrapper">
    <div class="tab-box">
        <button id="tab-reg" class="btn-tab active" onclick="setMode('reg')">Registration</button>
        <button id="tab-login" class="btn-tab" onclick="setMode('login')">Login</button>
    </div>

    <div class="main-card">
        <div class="field reg-field"><label>Full Name</label><input type="text"></div>
        <div class="field reg-field"><label>User Name</label><input type="text"></div>
        <div class="field"><label>Email Address</label><input type="email" id="em"></div>
        <div class="field reg-field"><label>Confirm Email</label><input type="email"></div>
        <div class="field"><label>Your Password</label><input type="password" id="p1"></div>
        <div class="field reg-field"><label>Confirm Password</label><input type="password"></div>
        <div class="field reg-field"><label>Secret Question</label><input type="text"></div>
        <div class="field reg-field"><label>Secret Answer</label><input type="text"></div>
        
        <button class="btn-action" id="main-btn" onclick="go()">Confirm Registration</button>
    </div>

    <div class="cert-section">
        <div class="cert-img">📜</div>
        <div class="cert-info">
            <h3 style="color:var(--gold); font-family:'Orbitron'; margin:0;">UK REGISTRATION: 13693096</h3>
            <p style="font-size: 0.8em; color: #aaa; margin-top: 10px;">AURELIUS is a verified investment protocol. Registered under UK laws.</p>
            <span style="color: #00ff88; font-size: 0.7em; font-family: 'Orbitron';">● ACTIVE & VERIFIED</span>
        </div>
    </div>
</div>

<a href="https://t.me/Laslo19898989" class="support-btn">SUPPORT ONLINE</a>

<script>
    const supabaseUrl = 'https://kxpsdcepytmnbtzexlup.supabase.co';
    const supabaseKey = 'Sb_publishable_VtS1oNI1B5mbrEnMn8YtsQ_-Ok6y6k7';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    // Функция переключения между Регистрацией и Входом
    function setMode(m) {
        const regFields = document.querySelectorAll('.reg-field');
        const mainBtn = document.getElementById('main-btn');
        const tabReg = document.getElementById('tab-reg');
        const tabLogin = document.getElementById('tab-login');

        if(m === 'login') {
            regFields.forEach(f => f.style.display = 'none');
            mainBtn.innerText = "Authorize Login";
            tabLogin.classList.add('active'); tabReg.classList.remove('active');
        } else {
            regFields.forEach(f => f.style.display = 'block');
            mainBtn.innerText = "Confirm Registration";
            tabReg.classList.add('active'); tabLogin.classList.remove('active');
        }
    }

    // Анимация монет на фоне
    const canvas = document.getElementById('coin-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let coins = [];
    for(let i=0; i<25; i++) {
        coins.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            s: Math.random() * 2 + 1,
            v: Math.random() * 3 + 1
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "rgba(255, 215, 0, 0.6)";
        coins.forEach(c => {
            c.y += c.v;
            if(c.y > canvas.height) c.y = -20;
            ctx.beginPath();
            ctx.arc(c.x, c.y, c.s * 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "black";
            ctx.fillText("₿", c.x - 3, c.y + 3);
            ctx.fillStyle = "rgba(255, 215, 0, 0.6)";
        });
        requestAnimationFrame(draw);
    }
    draw();

    async function go() {
        const email = document.getElementById('em').value;
        const pass = document.getElementById('p1').value;
        const { error } = await _supabase.auth.signInWithPassword({ email, password: pass });
        if(error) {
            const { error: se } = await _supabase.auth.signUp({ email, password: pass });
            if(se) alert(se.message); else alert("Account created! Please Log In.");
        } else { location.reload(); }
    }
</script>
</body>
    </html>
