<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURELIUS | AI PROTOCOL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; }
        
        /* Фон с роботом */
        .hero { 
            width: 100%; height: 100vh; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://img.freepik.com/free-photo/html-system-websites-concept_23-2150376770.jpg') center/cover no-repeat;
            display: flex; flex-direction: column; align-items: center; position: relative;
        }

        .header { width: 100%; padding: 20px; display: flex; justify-content: space-between; box-sizing: border-box; position: absolute; top: 0; z-index: 10; }
        .logo { font-family: 'Orbitron'; font-size: 28px; color: var(--accent); letter-spacing: 5px; }
        
        .nav-btns { display: flex; gap: 15px; }
        .nav-btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 10px 25px; border-radius: 5px; cursor: pointer; font-family: 'Orbitron'; font-size: 12px; }
        .nav-btn.reg { background: var(--accent); color: #000; }

        /* Контент центра */
        .hero-content { margin-top: 15vh; text-align: center; z-index: 5; }
        .hero-content h1 { font-family: 'Orbitron'; font-size: 48px; margin-bottom: 10px; }

        /* Три плана */
        .plans { display: flex; justify-content: center; gap: 20px; margin-top: 50px; flex-wrap: wrap; padding: 0 20px; }
        .plan-card { background: rgba(0, 0, 0, 0.7); border: 1px solid #333; border-radius: 12px; padding: 30px; width: 260px; text-align: center; border-bottom: 3px solid var(--accent); }
        .plan-card h3 { font-family: 'Orbitron'; color: #888; margin: 0; font-size: 14px; }
        .plan-card .rate { font-size: 40px; font-weight: 800; color: var(--accent); margin: 15px 0; }
        .plan-card p { font-size: 12px; color: #666; margin: 0; }

        /* Окно авторизации (скрыто) */
        #auth-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0a0a0a; padding: 40px; border: 1px solid var(--accent); border-radius: 15px; z-index: 1000; width: 90%; max-width: 500px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .field { display: flex; flex-direction: column; text-align: left; }
        .field label { font-size: 10px; color: var(--accent); margin-bottom: 5px; font-family: 'Orbitron'; }
        .field input { background: #000; border: 1px solid #333; padding: 10px; color: #fff; border-radius: 4px; }
        .full { grid-column: span 2; }
        .submit-btn { background: var(--accent); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; margin-top: 15px; border-radius: 4px; }
        
        #dash { display: none; text-align: center; padding: 100px 20px; }
    </style>
</head>
<body>

    <div id="landing">
        <div class="hero">
            <div class="header">
                <div class="logo">AURELIUS</div>
                <div class="nav-btns">
                    <button class="nav-btn" onclick="openAuth('login')">LOGIN</button>
                    <button class="nav-btn reg" onclick="openAuth('reg')">REGISTER</button>
                </div>
            </div>

            <div class="hero-content">
                <h1>AI PROTOCOL</h1>
                <p style="color: #00f2ff; letter-spacing: 2px;">SECURE CRYPTO INVESTMENTS</p>
                
                <div class="plans">
                    <div class="plan-card">
                        <h3>Starter</h3>
                        <div class="rate">2.1%</div>
                        <p>Daily for 15 Days</p>
                    </div>
                    <div class="plan-card">
                        <h3>Pro Miner</h3>
                        <div class="rate">3.5%</div>
                        <p>Daily for 30 Days</p>
                    </div>
                    <div class="plan-card">
                        <h3>VIP Miner</h3>
                        <div class="rate">5.0%</div>
                        <p>Daily for 60 Days</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="auth-modal">
            <h2 id="modal-title" style="font-family:'Orbitron'; text-align:center;">LOGIN</h2>
            <div class="grid">
                <div class="field r-field"><label>Full Name</label><input type="text" id="reg-name"></div>
                <div class="field r-field"><label>Username</label><input type="text" id="reg-user"></div>
                <div class="field full"><label>Email</label><input type="email" id="email"></div>
                <div class="field full"><label>Password</label><input type="password" id="pass"></div>
                <div id="status-txt" class="full" style="text-align:center; font-size:12px;"></div>
                <button class="submit-btn full" onclick="processAuth()" id="action-btn">PROCEED</button>
                <button class="full" onclick="closeAuth()" style="background:none; border:none; color:#555; cursor:pointer; font-size:10px;">CLOSE</button>
            </div>
        </div>
    </div>

    <div id="dash">
        <h1 style="font-family:'Orbitron'; color:var(--accent);">DASHBOARD</h1>
        <div style="border: 1px solid var(--accent); padding: 50px; border-radius: 20px; display: inline-block;">
            <p>TOTAL BALANCE</p>
            <h2 style="font-size: 48px;">$ 0.00</h2>
            <button onclick="location.reload()" style="background:none; border:1px solid #333; color:#fff; padding:10px 20px; cursor:pointer;">LOGOUT</button>
        </div>
    </div>

<script>
    const URL = 'https://kxpsdcepytmnbtzexlup.supabase.co';
    const KEY = 'sb_publishable_VtS1oNI1B5mbrEnMn8YtsQ_-Ok6y6k7';
    const _sb = supabase.createClient(URL, KEY);

    function openAuth(mode) {
        document.getElementById('auth-modal').style.display = 'block';
        const rFields = document.querySelectorAll('.r-field');
        const title = document.getElementById('modal-title');
        const btn = document.getElementById('action-btn');

        if(mode === 'login') {
            rFields.forEach(f => f.style.display = 'none');
            title.innerText = "CLIENT LOGIN";
            btn.innerText = "SIGN IN";
        } else {
            rFields.forEach(f => f.style.display = 'flex');
            title.innerText = "REGISTRATION";
            btn.innerText = "CREATE ACCOUNT";
        }
    }

    function closeAuth() { document.getElementById('auth-modal').style.display = 'none'; }

    async function processAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const btn = document.getElementById('action-btn');
        const st = document.getElementById('status-txt');

        st.innerText = "Processing...";
        
        if(btn.innerText === "SIGN IN") {
            const { error } = await _sb.auth.signInWithPassword({ email, password: pass });
            if(error) { st.innerText = "Error: Invalid login"; st.style.color = "red"; }
            else { document.getElementById('landing').style.display = 'none'; document.getElementById('dash').style.display = 'block'; }
        } else {
            const { error } = await _sb.auth.signUp({ email, password: pass });
            if(error) { st.innerText = error.message; st.style.color = "red"; }
            else { st.innerText = "Success! Now Login."; st.style.color = "lime"; }
        }
    }
</script>
</body>
    </html>
