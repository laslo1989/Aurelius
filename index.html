<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURELIUS | AI Protocol</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #fcc200; --bg: #080808; --card: #121212; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; }
        
        #main-site { display: block; }
        #dashboard { display: none; padding: 40px; text-align: center; }

        header { padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .logo { font-family: 'Orbitron'; font-size: 24px; color: var(--gold); letter-spacing: 3px; }

        .auth-container { max-width: 900px; margin: 40px auto; background: #0f1215; border-radius: 15px; padding: 40px; border: 1px solid #222; }
        .tabs { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .tab-btn { padding: 12px 40px; font-family: 'Orbitron'; cursor: pointer; border: 2px solid var(--gold); background: transparent; color: var(--gold); border-radius: 5px; }
        .tab-btn.active { background: var(--gold); color: black; box-shadow: 0 0 20px rgba(252, 194, 0, 0.4); }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .field { text-align: left; }
        .field label { display: block; font-size: 11px; color: var(--gold); margin-bottom: 8px; font-family: 'Orbitron'; text-transform: uppercase; }
        .field input { width: 100%; padding: 14px; background: #000; border: 1px solid #333; color: white; border-radius: 4px; border-left: 3px solid var(--gold); box-sizing: border-box; }

        .btn-confirm { width: 100%; grid-column: span 2; padding: 18px; background: var(--gold); border: none; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; margin-top: 20px; border-radius: 5px; }

        .cert-box { background: #111; border-radius: 12px; padding: 30px; display: flex; align-items: center; gap: 20px; margin-top: 40px; border: 1px solid #222; }
        .balance-box { background: linear-gradient(145deg, #1a1a1a, #000); border: 1px solid var(--gold); padding: 50px; border-radius: 20px; display: inline-block; min-width: 300px; }
        
        /* Сообщения об ошибках внутри формы, а не в окнах */
        #form-error { color: #ff4444; font-size: 12px; grid-column: span 2; text-align: center; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div id="main-site">
    <header>
        <div class="logo">AURELIUS</div>
        <div style="font-size: 10px; color: var(--gold); font-family: 'Orbitron';">SYSTEM STATUS: ONLINE</div>
    </header>

    <div class="auth-container">
        <div class="tabs">
            <button class="tab-btn active" id="btn-reg" onclick="setMode('reg')">REGISTRATION</button>
            <button class="tab-btn" id="btn-login" onclick="setMode('login')">LOGIN</button>
        </div>

        <div class="form-grid">
            <div class="field reg-only"><label>Full Name</label><input type="text" id="f_name"></div>
            <div class="field reg-only"><label>User Name</label><input type="text" id="u_name"></div>
            <div class="field"><label>Your Email</label><input type="email" id="u_email"></div>
            <div class="field reg-only"><label>Confirm Email</label><input type="email"></div>
            <div class="field"><label>Your Password</label><input type="password" id="u_pass"></div>
            <div class="field reg-only"><label>Confirm Password</label><input type="password"></div>
            <div id="form-error"></div>
            <button class="btn-confirm" id="action-btn" onclick="runAuth()">CONFIRM ACTION</button>
        </div>
    </div>
</div>

<div id="dashboard">
    <h1 style="font-family: 'Orbitron'; color: var(--gold);">USER DASHBOARD</h1>
    <div class="balance-box">
        <p style="color: #888;">TOTAL BALANCE</p>
        <h2 style="font-size: 48px; margin: 10px 0; color: #00ff88;">$ 0.00</h2>
        <button onclick="location.reload()" style="background: none; border: 1px solid #444; color: white; padding: 10px; cursor: pointer;">Logout</button>
    </div>
</div>

<script>
    // --- ВСТАВЬ СВОИ КЛЮЧИ ЗДЕСЬ ---
    const URL = 'https://kxpsdcepytmnbtzexlup.supabase.co'; 
    const KEY = 'Sb_publishable_VtS1oNI1B5mbrEnMn8YtsQ_-Ok6y6k7'; 
    const _supa = supabase.createClient(URL, KEY);

    const errBox = document.getElementById('form-error');

    function setMode(m) {
        const regF = document.querySelectorAll('.reg-only');
        const btn = document.getElementById('action-btn');
        errBox.style.display = 'none';
        if(m === 'login') {
            regF.forEach(f => f.style.display = 'none');
            btn.innerText = "LOGIN";
            document.getElementById('btn-login').classList.add('active');
            document.getElementById('btn-reg').classList.remove('active');
        } else {
            regF.forEach(f => f.style.display = 'block');
            btn.innerText = "CONFIRM ACTION";
            document.getElementById('btn-reg').classList.add('active');
            document.getElementById('btn-login').classList.remove('active');
        }
    }

    async function runAuth() {
        const email = document.getElementById('u_email').value;
        const pass = document.getElementById('u_pass').value;
        const btn = document.getElementById('action-btn');
        errBox.style.display = 'none';

        if(!email || !pass) {
            errBox.innerText = "Please fill all fields";
            errBox.style.display = 'block';
            return;
        }

        if(btn.innerText === "LOGIN") {
            const { data, error } = await _supa.auth.signInWithPassword({ email, password: pass });
            if(error) {
                errBox.innerText = "Invalid credentials";
                errBox.style.display = 'block';
            } else {
                // Вход успешен - перекидываем без окон
                showDashboard();
            }
        } else {
            const { data, error } = await _supa.auth.signUp({ email, password: pass });
            if(error) {
                errBox.innerText = error.message;
                errBox.style.display = 'block';
            } else {
                // Регистрация успешна - сразу переключаем на вход
                setMode('login');
                errBox.innerText = "Registration complete. Please Login.";
                errBox.style.color = "#00ff88";
                errBox.style.display = 'block';
            }
        }
    }

    function showDashboard() {
        document.getElementById('main-site').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        window.scrollTo(0, 0);
    }
</script>

</body>
</html>
