<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURELIUS | Secure Protocol</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .wrapper { max-width: 900px; margin: 50px auto; padding: 20px; }
        
        /* Логотип */
        .header { text-align: center; margin-bottom: 40px; }
        .logo { font-family: 'Orbitron'; font-size: 28px; color: #d4af37; letter-spacing: 5px; }

        /* Переключатель Регистрация / Логин */
        .mode-switch { display: flex; justify-content: center; margin-bottom: 30px; border-bottom: 1px solid #222; }
        .mode-btn { padding: 15px 30px; cursor: pointer; color: #666; font-weight: 600; border-bottom: 2px solid transparent; transition: 0.3s; }
        .mode-btn.active { color: #d4af37; border-bottom-color: #d4af37; }

        /* Форма */
        .form-container { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 12px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .field { display: flex; flex-direction: column; }
        .field label { font-size: 11px; text-transform: uppercase; color: #888; margin-bottom: 8px; letter-spacing: 1px; }
        .field input { background: #000; border: 1px solid #333; padding: 12px; color: #fff; border-radius: 6px; font-size: 14px; }
        .field input:focus { border-color: #d4af37; outline: none; }

        .full-width { grid-column: span 2; }
        .btn-submit { background: #d4af37; color: #000; border: none; padding: 18px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 14px; margin-top: 20px; text-transform: uppercase; transition: 0.3s; }
        .btn-submit:hover { background: #fcc200; }

        #status-bar { text-align: center; margin-top: 15px; font-size: 13px; min-height: 20px; font-weight: 600; }

        /* Личный кабинет */
        #dashboard { display: none; text-align: center; }
        .balance-card { background: #0a0a0a; border: 1px solid #d4af37; padding: 50px; border-radius: 15px; margin-top: 30px; }
        .balance-num { font-size: 48px; color: #00ff88; margin: 15px 0; font-family: 'Orbitron'; }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="auth-screen">
        <div class="header"><div class="logo">AURELIUS</div></div>

        <div class="mode-switch">
            <div class="mode-btn active" id="tab-reg" onclick="toggle('reg')">REGISTRATION</div>
            <div class="mode-btn" id="tab-login" onclick="toggle('login')">SIGN IN</div>
        </div>

        <div class="form-container">
            <div class="grid">
                <div class="field reg-field"><label>Full Name</label><input type="text" id="inp-name" placeholder="John Doe"></div>
                <div class="field reg-field"><label>Username</label><input type="text" id="inp-user" placeholder="johnny77"></div>
                <div class="field"><label>Email Address</label><input type="email" id="inp-email" placeholder="mail@example.com"></div>
                <div class="field reg-field"><label>Confirm Email</label><input type="email"></div>
                <div class="field"><label>Password</label><input type="password" id="inp-pass" placeholder="••••••••"></div>
                <div class="field reg-field"><label>Confirm Password</label><input type="password"></div>
                
                <div class="full-width" id="status-bar"></div>
                <button class="btn-submit full-width" id="btn-action" onclick="submit()">Confirm Registration</button>
            </div>
        </div>
    </div>

    <div id="dashboard">
        <div class="header"><div class="logo">AURELIUS</div></div>
        <div class="balance-card">
            <p style="color: #666; text-transform: uppercase;">Total Balance</p>
            <div class="balance-num">$ 0.00</div>
            <div style="display: flex; gap: 10px; margin-top: 30px;">
                <button style="flex:1; padding: 15px; background: #fff; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">DEPOSIT</button>
                <button onclick="location.reload()" style="flex:1; padding: 15px; background: transparent; border:1px solid #444; color:#fff; border-radius:5px; cursor:pointer;">SIGN OUT</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Твои данные Supabase
    const S_URL = 'https://kxpsdcepytmnbtzexlup.supabase.co';
    const S_KEY = 'sb_publishable_VtS1oNI1B5mbrEnMn8YtsQ_-Ok6y6k7';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    const status = document.getElementById('status-bar');

    function toggle(mode) {
        const regs = document.querySelectorAll('.reg-field');
        const btn = document.getElementById('btn-action');
        status.innerText = "";
        
        if(mode === 'login') {
            regs.forEach(f => f.style.display = 'none');
            btn.innerText = "Sign In";
            document.getElementById('tab-login').classList.add('active');
            document.getElementById('tab-reg').classList.remove('active');
        } else {
            regs.forEach(f => f.style.display = 'flex');
            btn.innerText = "Confirm Registration";
            document.getElementById('tab-reg').classList.add('active');
            document.getElementById('tab-login').classList.remove('active');
        }
    }

    async function submit() {
        const email = document.getElementById('inp-email').value;
        const pass = document.getElementById('inp-pass').value;
        const btn = document.getElementById('btn-action');

        status.style.color = "#d4af37";
        status.innerText = "Processing...";

        if(!email || !pass) {
            status.style.color = "#ff4444";
            status.innerText = "Error: Fill all fields";
            return;
        }

        if(btn.innerText === "Sign In") {
            const { error } = await _supabase.auth.signInWithPassword({ email, password: pass });
            if(error) {
                status.style.color = "#ff4444";
                status.innerText = "Login failed: Invalid details";
            } else {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            }
        } else {
            const { error } = await _supabase.auth.signUp({ email, password: pass });
            if(error) {
                status.style.color = "#ff4444";
                status.innerText = error.message;
            } else {
                status.style.color = "#00ff88";
                status.innerText = "Success! Now switch to SIGN IN tab.";
            }
        }
    }
</script>

</body>
                                                                         </html>
