<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURELIUS | AI Investment Protocol</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd700; --accent: #00f2ff; --bg: #050505; }
        body {
            margin: 0; font-family: 'Inter', sans-serif; color: white; overflow-x: hidden;
            background: var(--bg) url('https://i.ibb.co/C04Y20n/cyberpunk-gold-circuit.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        /* Бегущая строка новым цветом */
        .header-nav { position: fixed; top: 0; width: 100%; height: 50px; background: rgba(0, 0, 0, 0.9); z-index: 1000; border-bottom: 2px solid var(--accent); display: flex; align-items: center; }
        .ticker-wrap { white-space: nowrap; animation: ticker 30s linear infinite; font-family: 'Orbitron'; font-size: 0.9em; color: var(--accent); text-shadow: 0 0 10px var(--accent); }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-150%); } }

        .container { max-width: 1100px; margin: 0 auto; padding: 100px 20px; text-align: center; }

        /* Блок кнопок Вход/Регистрация */
        .auth-toggle { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; }
        .btn-toggle { padding: 15px 40px; border: 2px solid var(--gold); background: transparent; color: var(--gold); font-family: 'Orbitron'; cursor: pointer; border-radius: 5px; transition: 0.4s; text-transform: uppercase; font-weight: bold; }
        .btn-toggle.active { background: var(--gold); color: #000; box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
        .btn-toggle:hover { box-shadow: 0 0 30px var(--gold); }

        /* Форма регистрации по твоему образцу */
        .auth-card { background: rgba(20, 20, 20, 0.8); padding: 40px; border-radius: 15px; border: 1px solid rgba(255,215,0,0.2); max-width: 800px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; backdrop-filter: blur(10px); }
        .input-group { text-align: left; }
        .input-group label { display: block; font-size: 0.8em; color: var(--gold); margin-bottom: 8px; font-family: 'Orbitron'; }
        .custom-input { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #444; color: #fff; box-sizing: border-box; border-left: 3px solid var(--gold); }
        .full-width { grid-column: 1 / -1; }

        /* Блок с сертификатом */
        .reg-block { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; background: rgba(255,215,0,0.05); padding: 40px; border-radius: 15px; align-items: center; margin-top: 60px; text-align: left; border: 1px solid rgba(255,215,0,0.1); }
        .cert-img { width: 100%; max-width: 320px; border: 2px solid var(--gold); filter: drop-shadow(0 0 15px var(--gold)); }

        .tg-link { position: fixed; bottom: 20px; left: 20px; background: var(--accent); color: #000; padding: 15px 30px; border-radius: 5px; text-decoration: none; font-weight: bold; font-family: 'Orbitron'; z-index: 1000; box-shadow: 0 0 15px var(--accent); }
    </style>
</head>
<body>

<a href="https://t.me/Laslo19898989" class="tg-link" target="_blank">SUPPORT ONLINE</a>

<div class="header-nav">
    <div class="ticker-wrap" id="live-ticker">SYSTEM STATUS: ACTIVE | LOADING CRYPTO DATA... | AURELIUS PROTOCOL V.3.1</div>
</div>

<div class="container">
    <div class="auth-toggle">
        <button class="btn-toggle active" onclick="showAuth('signup')">Registration</button>
        <button class="btn-toggle" onclick="showAuth('login')">Login</button>
    </div>

    <div id="auth-section">
        <div class="auth-card">
            <div class="input-group"><label>Full Name</label><input type="text" class="custom-input"></div>
            <div class="input-group"><label>User Name</label><input type="text" class="custom-input"></div>
            <div class="input-group"><label>Password</label><input type="password" id="pass" class="custom-input"></div>
            <div class="input-group"><label>Confirm Password</label><input type="password" class="custom-input"></div>
            <div class="input-group"><label>Email Address</label><input type="email" id="email" class="custom-input"></div>
            <div class="input-group"><label>Confirm Email</label><input type="email" class="custom-input"></div>
            <div id="reg-only-fields" style="display: contents;">
                <div class="input-group"><label>Secret Question</label><input type="text" class="custom-input"></div>
                <div class="input-group"><label>Secret Answer</label><input type="text" class="custom-input"></div>
                <div class="input-group full-width"><label>Your Upline</label><input type="text" class="custom-input" value="Aurelius AI" disabled></div>
            </div>
            <button class="btn-toggle active full-width" style="margin-top: 20px;" onclick="handleAuth()">Confirm Action</button>
        </div>
    </div>

    <div class="reg-block">
        <div>
            <h2 style="font-family: 'Orbitron'; color: var(--gold);">UK REGISTRATION</h2>
            <p style="font-size: 2em; font-family: 'Orbitron'; margin: 10px 0;">13693096</p>
            <p style="opacity: 0.8; line-height: 1.6;">Official certified investment protocol registered in the United Kingdom.</p>
            <p style="color: var(--accent); font-family: 'Orbitron'; margin-top: 20px;">● ACTIVE & VERIFIED</p>
        </div>
        <div style="text-align: center;">
            <img src="https://i.ibb.co/p3q8X2n/uk-cert.png" alt="UK Certificate" class="cert-img">
        </div>
    </div>
</div>

<script>
    const supabaseUrl = 'https://kxpsdcepytmnbtzexlup.supabase.co';
    const supabaseKey = 'Sb_publishable_VtS1oNI1B5mbrenmn8ytsq_-ok6y6k7';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    function showAuth(mode) {
        const fields = document.getElementById('reg-only-fields');
        const btns = document.querySelectorAll('.btn-toggle');
        if(mode === 'login') {
            fields.style.display = 'none';
            btns[1].classList.add('active'); btns[0].classList.remove('active');
        } else {
            fields.style.display = 'contents';
            btns[0].classList.add('active'); btns[1].classList.remove('active');
        }
    }

    async function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const { error } = await _supabase.auth.signInWithPassword({ email, password: pass });
        if(error) {
            const { error: se } = await _supabase.auth.signUp({ email, password: pass });
            if(se) alert(se.message); else alert("Account created! Please login.");
        } else { location.reload(); }
    }

    async function fetchPrices() {
        try {
            const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,binancecoin&vs_currencies=usd');
            const data = await res.json();
            document.getElementById('live-ticker').innerText = `SYSTEM STATUS: ACTIVE | BTC: $${data.bitcoin.usd} | ETH: $${data.ethereum.usd} | BNB: $${data.binancecoin.usd} | UK REG: 13693096`;
        } catch(e){}
    }
    
    setInterval(fetchPrices, 30000); 
    fetchPrices();
    // checkUser(); // Эту функцию пока закомментировал, чтобы она не мешала регистрации/логину на старте. Разкомментируем, когда понадобится функционал личного кабинета.
</script>
</body>
    </html>
