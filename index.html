<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURELIUS | AI PROTOCOL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; }
        
        /* Фон с роботом как на картинке */
        .hero { 
            width: 100%; min-height: 100vh; 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://img.freepik.com/free-photo/html-system-websites-concept_23-2150376770.jpg') center/cover no-repeat;
            display: flex; flex-direction: column; align-items: center; position: relative;
        }

        .header { width: 100%; padding: 20px 40px; display: flex; justify-content: space-between; box-sizing: border-box; position: absolute; top: 0; z-index: 10; }
        .logo { font-family: 'Orbitron'; font-size: 28px; color: var(--accent); letter-spacing: 5px; }
        
        .nav-btns { display: flex; gap: 15px; }
        .nav-btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 10px 25px; border-radius: 5px; cursor: pointer; font-family: 'Orbitron'; font-size: 12px; }
        .nav-btn.reg { background: var(--accent); color: #000; }

        .hero-content { margin-top: 15vh; text-align: center; z-index: 5; width: 100%; }
        .hero-content h1 { font-family: 'Orbitron'; font-size: 50px; margin-bottom: 5px; letter-spacing: 2px; }
        .hero-content p { color: var(--accent); font-family: 'Orbitron'; font-size: 14px; margin-bottom: 40px; }

        /* Три инвестиционных плана */
        .plans { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; padding: 0 20px; }
        .plan-card { background: rgba(0, 0, 0, 0.8); border: 1px solid #333; border-radius: 12px; padding: 30px; width: 280px; text-align: center; border-bottom: 4px solid var(--accent); }
        .plan-card h3 { font-family: 'Orbitron'; color: #888; margin: 0; font-size: 14px; text-transform: uppercase; }
        .plan-card .rate { font-size: 45px; font-weight: 800; color: var(--accent); margin: 15px 0; font-family: 'Orbitron'; }
        .plan-card p { font-size: 12px; color: #666; margin: 0; }

        /* Форма (модальное окно) */
        #auth-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0d1117; padding: 40px; border: 1px solid var(--accent); border-radius: 15px; z-index: 1000; width: 90%; max-width: 450px; box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); }
        .field { display: flex; flex-direction: column; margin-bottom: 15px; }
        .field label { font-size: 10px; color: var(--accent); margin-bottom: 5px; font-family: 'Orbitron'; }
        .field input { background: #000; border: 1px solid #333; padding: 12px; color: #fff; border-radius: 5px; font-size: 14px; }
        .submit-btn { background: var(--accent); color: #000; border: none; padding: 15px; font-weight: 800; cursor: pointer; font-family: 'Orbitron'; width: 100%; border-radius: 5px; margin-top: 10px; }
        
        /* Личный кабинет */
        #dash { display: none; min-height: 100vh; background: #050505; text-align: center; padding-top: 100px; }
        .balance-box { border: 1px solid var(--accent); padding: 60px; border-radius: 20px; display: inline-block; background: #0a0a0a; }
    </style>
</head>
<body>

    <div id="landing">
        <div class="hero">
            <div class="header">
                <div class="logo">AURELIUS</div>
                <div class="nav-btns">
                    <button class="nav-btn" onclick="openAuth('login')">LOGIN</button>
                    <button class="nav-btn reg" onclick="openAuth('reg')">REGISTER</button>
                </div>
            </div>

            <div class="hero-content">
                <h1>AI PROTOCOL</h1>
                <p>SAFE INVESTMENT WITH AURELIUS</p>
                
                <div class="plans">
                    <div class="plan-card">
                        <h3>Starter</h3>
                        <div class="rate">2.1%</div>
                        <p>Daily for 15 Days</p>
                    </div>
                    <div class="plan-card">
                        <h3>Pro Miner</h3>
                        <div class="rate">3.5%</div>
                        <p>Daily for 30 Days</p>
                    </div>
                    <div class="plan-card">
                        <h3>VIP Miner</h3>
                        <div class="rate">5.0%</div>
                        <p>Daily for 60 Days</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="auth-modal">
            <h2 id="modal-title" style="font-family:'Orbitron'; text-align:center; margin-bottom:25px;">CLIENT LOGIN</h2>
            <div class="field r-field"><label>Full Name</label><input type="text" id="reg-name"></div>
            <div class="field"><label>Email Address</label><input type="email" id="email" placeholder="email@example.com"></div>
            <div class="field"><label>Password</label><input type="password" id="pass" placeholder="••••••••"></div>
            <div id="status-txt" style="text-align:center; font-size:12px; margin-bottom:10px;"></div>
            <button class="submit-btn" onclick="processAuth()" id="action-btn">SIGN IN</button>
            <p onclick="closeAuth()" style="text-align:center; color:#555; cursor:pointer; font-size:11px; margin-top:15px; font-family:'Orbitron';">CLOSE</p>
        </div>
    </div>

    <div id="dash">
        <div class="logo" style="margin-bottom: 40px;">AURELIUS</div>
        <div class="balance-box">
            <p style="color: #666; font-family: 'Orbitron'; font-size: 12px;">AVAILABLE BALANCE</p>
            <h2 style="font-size: 60px; color: var(--accent); font-family: 'Orbitron'; margin: 20px 0;">$ 0.00</h2>
            <div style="display:flex; gap:10px; margin-top:30px;">
                <button style="background:var(--accent); border:none; padding:15px 30px; font-weight:bold; border-radius:5px; cursor:pointer; flex:1;">DEPOSIT</button>
                <button onclick="location.reload()" style="background:none; border:1px solid #444; color:#fff; padding:15px 30px; border-radius:5px; cursor:pointer; flex:1;">LOGOUT</button>
            </div>
        </div>
    </div>

<script>
    // ПРОВЕРЬ ЭТИ ДАННЫЕ В СВОЕМ SUPABASE (Settings -> API)
    const URL = 'https://kxpsdcepytmnbtzexlup.supabase.co'; 
    const KEY = 'sb_publishable_VtS1oNI1B5mbrEnMn8YtsQ_-Ok6y6k7'; 
    
    const _sb = supabase.createClient(URL, KEY);

    function openAuth(mode) {
        document.getElementById('auth-modal').style.display = 'block';
        const rFields = document.querySelectorAll('.r-field');
        const title = document.getElementById('modal-title');
        const btn = document.getElementById('action-btn');

        if(mode === 'login') {
            rFields.forEach(f => f.style.display = 'none');
            title.innerText = "CLIENT LOGIN";
            btn.innerText = "SIGN IN";
        } else {
            rFields.forEach(f => f.style.display = 'flex');
            title.innerText = "REGISTRATION";
            btn.innerText = "CREATE ACCOUNT";
        }
    }

    function closeAuth() { document.getElementById('auth-modal').style.display = 'none'; }

    async function processAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const btn = document.getElementById('action-btn');
        const st = document.getElementById('status-txt');

        st.style.color = "var(--accent)";
        st.innerText = "Processing...";
        
        if(btn.innerText === "SIGN IN") {
            const { data, error } = await _sb.auth.signInWithPassword({ email, password: pass });
            if(error) { 
                st.innerText = "Login failed: " + error.message; 
                st.style.color = "#ff4444"; 
            } else { 
                // ПЕРЕКЛЮЧЕНИЕ В КАБИНЕТ
                document.getElementById('landing').style.display = 'none'; 
                document.getElementById('dash').style.display = 'block'; 
            }
        } else {
            const { data, error } = await _sb.auth.signUp({ email, password: pass });
            if(error) { 
                st.innerText = "Error: " + error.message; 
                st.style.color = "#ff4444"; 
            } else { 
                st.innerText = "Success! Please check your email or Login."; 
                st.style.color = "lime"; 
            }
        }
    }
</script>
</body>
    </html>
